<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#050505" />
    <meta
      name="description"
      content="Smart Restaurant Menu & Real-time Ordering System"
    />

    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-title" content="Kovixa" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/logo192.png" />

    <title>Kovixa | Smart Restaurant OS</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      /* --- GLOBAL VARIABLES & RESET --- */
      :root {
        --bg-color: #050505; 
        --primary-orange: #f97316;
        --text-color: #ffffff;
        --safe-bottom: env(safe-area-inset-bottom, 20px);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      html, body {
        height: 100%;
        width: 100%;
        background-color: var(--bg-color);
        /* 🎨 Subtle premium gradient background */
        background-image: radial-gradient(circle at 50% 0%, #1a0f0a 0%, #050505 60%);
        background-attachment: fixed;
        color: var(--text-color);
        font-family: "Plus Jakarta Sans", "Inter", sans-serif;
        overscroll-behavior-y: none; /* Prevents "bounce" scroll */
        -webkit-font-smoothing: antialiased;
        
        /* ✅ FIXED: Allow Vertical Scrolling, Prevent Horizontal */
        overflow-x: hidden; 
        overflow-y: auto; 
      }

      #root {
        width: 100%;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* --- 💻 SCROLLBARS (Dark Theme) --- */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #0a0a0a; }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--primary-orange); }

      /* --- 🌀 PRE-LOADER --- */
      #root:empty {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      #root:empty::before {
        content: "";
        width: 60px;
        height: 60px;
        border: 4px solid rgba(255, 255, 255, 0.1);
        border-top: 4px solid var(--primary-orange);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 20px;
      }

      #root:empty::after {
        content: "INITIALIZING KOVIXA...";
        font-family: "Poppins", sans-serif;
        font-weight: 700;
        font-size: 12px;
        letter-spacing: 3px;
        color: #666;
        animation: pulse 1.5s ease-in-out infinite;
      }

      @keyframes spin { 100% { transform: rotate(360deg); } }
      @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
