<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#050505" />
    <meta
      name="description"
      content="Smart Restaurant Menu & Real-time Ordering System"
    />

    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-title" content="Kovixa" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/logo192.png" />

    <title>Kovixa | Smart Restaurant OS</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      /* --- GLOBAL VARIABLES & RESET --- */
      :root {
        --bg-color: #050505; 
        --card-bg: #0a0a0a;
        --primary-orange: #f97316;
        --text-color: #ffffff;
        --safe-bottom: env(safe-area-inset-bottom, 20px); /* iPhone Home Bar Safety */
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent; /* Removes blue tap box on mobile */
      }

      html, body {
        height: 100%;
        width: 100%;
        background-color: var(--bg-color);
        /* 🎨 subtle gradient for Laptops so it doesn't look flat */
        background-image: radial-gradient(circle at 50% 0%, #1a0f0a 0%, #050505 60%);
        background-attachment: fixed;
        color: var(--text-color);
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        overscroll-behavior-y: none; /* Prevents "bounce" on Mac/iOS */
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #root {
        width: 100%;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        /* 📱 Mobile Safe Area Padding */
        padding-bottom: var(--safe-bottom);
      }

      /* --- 💻 LAPTOP SCROLLBARS (Make it look native) --- */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0a0a; 
      }
      ::-webkit-scrollbar-thumb {
        background: #333; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--primary-orange); 
      }

      /* --- 🖨️ THERMAL PRINTER HACKS (KOT/Bills) --- */
      @media print {
        body * { visibility: hidden; }
        #kot-receipt, #kot-receipt * { visibility: visible; }
        #kot-receipt {
          position: absolute;
          left: 0; top: 0;
          width: 80mm; /* Standard Thermal Paper */
          background: white !important;
          color: black !important;
          font-family: 'Courier New', monospace;
          padding: 5px;
        }
        @page { margin: 0; }
      }

      /* --- 🌀 PRE-LOADER SPINNER --- */
      #root:empty {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      #root:empty::before {
        content: "";
        width: 60px;
        height: 60px;
        border: 4px solid rgba(255, 255, 255, 0.1);
        border-top: 4px solid var(--primary-orange);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 20px;
      }

      #root:empty::after {
        content: "STARTING ENGINE...";
        font-family: "Poppins", sans-serif;
        font-weight: 700;
        font-size: 14px;
        letter-spacing: 2px;
        color: #666;
        animation: pulse 1.5s ease-in-out infinite;
      }

      @keyframes spin { 100% { transform: rotate(360deg); } }
      @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <div id="kot-receipt"></div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js")
            .then((reg) => console.log("✅ Kovixa OS: Service Worker Ready"))
            .catch((err) => console.log("❌ SW Error: ", err));
        });
      }
    </script>
  </body>
</html>
