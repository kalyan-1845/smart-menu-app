[build]
  # 🟢 Tells Netlify to enter the frontend folder first
  base = "frontend"
  
  # 🟢 Tells Netlify to output the build here
  publish = "dist"
  
  # 🟢 The command to run (inside the frontend folder)
  command = "npm install && npm run build"

# 🟢 IMPORTANT: This fixes the "Page Not Found" errors on refresh
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200