[build]
  base = "frontend"
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps"

# --- [START] ISP BYPASS FIX ---
# This rule tells Netlify: "If anyone asks for /api, fetch it from Railway for them"
# This MUST come before the index.html rule below.
[[redirects]]
  from = "/api/*"
  to = "https://smart-menu-app-production.up.railway.app/api/:splat"
  status = 200
  force = true
# --- [END] ISP BYPASS FIX ---

# This handles your React/Vite routing (Keep this at the bottom)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200